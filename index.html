<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OSINT CAM</title>
</head>

<body>
    <div id="gps"></div>
    <div id="camera"></div>
    <script>
        const gpsOptions = {
            enableHighAccuracy: true,
            timeout: 5000,
            maximumAge: 0
        };

        function updateGPS(position) {
            const gps = document.getElementById("gps");
            gps.innerHTML = "Latitude: " + position.coords.latitude + "<br>" +
                "Longitude: " + position.coords.longitude + "<br>" +
                "more or less" + position.coords.accuracy + " meters";
        }

        function gpsError(error) {
            const gps = document.getElementById("gps");
            gps.innerHTML = "Error Code: " + error.code + " - " + error.message;
        }

        window.onload = function () {
            console.log("OSINT CAM");
            // GPS
            const gps = document.getElementById("gps");
            navigator.geolocation.getCurrentPosition(updateGPS, gpsError, gpsOptions);
            navigator.geolocation.watchPosition(updateGPS, gpsError, gpsOptions);

            // Camera
            const camera = document.getElementById("camera");
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({
                    video: {facingMode: {ideal: 'environment'}, width: {ideal: 1920}, height: {ideal: 1080}},
                    audio: true
                })
                    .then(function (stream) {
                        const video = document.createElement("video");
                        video.srcObject = stream;
                        video.play();
                        camera.appendChild(video);
                    })
                    .catch(function (error) {
                        camera.innerHTML = "Camera access denied: " + error.message;
                    });
            } else {
                camera.innerHTML = "Camera not supported in this browser.";
            }
        }

    </script>
</body>

</html>
